<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Urban Luxe — Шахматка</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;--gold:#c9a961;--gold-d:#a88947;--gold-s:rgba(201,169,97,.15);--ink:#e8e2d6;--ink-m:#a8a096;--ink-d:#6b665e;--red:#e74c3c;--green:#2ecc71;--blue:#3498db;--orange:#e67e22;--line:rgba(232,226,214,.08);--row-h:36px;--col-w:42px;--name-w:140px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;line-height:1.4;overflow:hidden;height:100vh}

/* Layout */
.topbar{background:var(--bg2);border-bottom:1px solid var(--line);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;height:48px;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:400;color:var(--gold)}
.topbar h1 a{color:var(--ink-d);text-decoration:none;font-size:12px;margin-left:12px}.topbar h1 a:hover{color:var(--gold)}
.controls{display:flex;gap:8px;align-items:center}
.btn{padding:6px 14px;background:var(--gold);color:var(--bg);border:none;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:inherit;font-weight:600;border-radius:3px}
.btn:hover{background:var(--gold-d)}.btn-sm{padding:5px 10px;font-size:10px}
.btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink-m)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.month-nav{display:flex;align-items:center;gap:6px}
.month-label{min-width:130px;text-align:center;font-size:14px;font-weight:500;color:var(--ink)}

/* Legend */
.legend{display:flex;gap:10px;font-size:10px;color:var(--ink-d);align-items:center;padding:6px 20px;background:var(--bg2);border-bottom:1px solid var(--line);flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Grid Container */
.grid-wrap{flex:1;overflow:auto;position:relative}

/* Chess Grid */
.chess{display:grid;position:relative;min-width:fit-content}

/* Header row */
.chess-header{display:contents}
.chess-corner{position:sticky;left:0;z-index:10;background:var(--bg);padding:0 8px;display:flex;align-items:center;font-size:10px;color:var(--ink-d);text-transform:uppercase;letter-spacing:.1em;border-bottom:2px solid var(--line);border-right:1px solid var(--line);min-width:var(--name-w);height:44px}
.chess-day{display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:2px solid var(--line);border-right:1px solid var(--line);font-size:10px;color:var(--ink-d);min-width:var(--col-w);height:44px;user-select:none}
.chess-day.today{background:rgba(201,169,97,.08);color:var(--gold);font-weight:700}
.chess-day.weekend{color:var(--red)}
.chess-day .dow{font-size:8px;text-transform:uppercase;margin-bottom:1px}

/* Complex separator */
.chess-complex{position:sticky;left:0;z-index:5;font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:6px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px}
.chess-complex-dot{width:6px;height:6px;border-radius:50%}

/* Apartment row */
.chess-apt{position:sticky;left:0;z-index:5;background:var(--bg2);padding:0 10px;display:flex;align-items:center;font-size:11px;font-weight:500;border-bottom:1px solid var(--line);border-right:1px solid var(--line);min-width:var(--name-w);height:var(--row-h);white-space:nowrap;cursor:default}

/* Day cells */
.chess-cell{border-bottom:1px solid var(--line);border-right:1px solid var(--line);min-width:var(--col-w);height:var(--row-h);position:relative;cursor:pointer;transition:background .15s}
.chess-cell:hover{background:rgba(201,169,97,.04)}
.chess-cell.today{background:rgba(201,169,97,.03)}
.chess-cell.weekend{background:rgba(231,76,60,.02)}

/* Booking bars (positioned absolute over cells) */
.booking-bar{position:absolute;top:3px;height:calc(var(--row-h) - 7px);border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:500;color:#fff;cursor:grab;z-index:3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:box-shadow .2s,transform .1s;user-select:none;min-width:20px}
.booking-bar:hover{box-shadow:0 2px 12px rgba(0,0,0,.5);z-index:4;transform:translateY(-1px)}
.booking-bar.dragging{opacity:.6;z-index:10;cursor:grabbing;box-shadow:0 4px 20px rgba(0,0,0,.7)}
.booking-bar .bar-label{overflow:hidden;text-overflow:ellipsis;flex:1}
.booking-bar .bar-price{font-size:8px;opacity:.8;margin-left:4px;flex-shrink:0}

/* Resize handles */
.booking-bar .resize-r{position:absolute;right:0;top:0;bottom:0;width:6px;cursor:e-resize;z-index:5}
.booking-bar .resize-r:hover{background:rgba(255,255,255,.2)}

/* Drag ghost preview */
.drag-preview{position:fixed;pointer-events:none;z-index:100;opacity:.7;border-radius:4px;padding:4px 8px;font-size:10px;color:#fff;font-family:'Inter',sans-serif}

/* Drop target highlight */
.chess-cell.drop-target{background:rgba(201,169,97,.12)!important;outline:1px dashed var(--gold)}

/* Source colors */
.src-airbnb{background:#FF5A5F}.src-booking{background:#003580}.src-ostrovok{background:#2ecc71}.src-yandex{background:#f39c12}.src-sutochno{background:#3498db}.src-website{background:var(--gold)}.src-phone{background:#9b59b6}.src-telegram{background:#0088cc}.src-other{background:#555}.src-blocked{background:#222;border:1px dashed #444}

/* Tooltip */
.tooltip{position:fixed;background:var(--bg2);border:1px solid var(--line);border-radius:6px;padding:12px;font-size:11px;z-index:50;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:260px;display:none}
.tooltip.show{display:block}
.tooltip .tt-title{font-size:13px;font-weight:500;margin-bottom:6px;color:var(--gold)}
.tooltip .tt-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--ink-m)}
.tooltip .tt-row strong{color:var(--ink)}

/* Quick edit panel */
.quick-edit{position:fixed;background:var(--bg2);border:1px solid var(--gold);border-radius:8px;padding:16px;z-index:60;box-shadow:0 8px 40px rgba(0,0,0,.6);width:320px;display:none}
.quick-edit.show{display:block}
.quick-edit h3{font-size:14px;font-weight:400;color:var(--gold);margin-bottom:12px}
.quick-edit label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-d);display:block;margin-bottom:3px;margin-top:8px}
.quick-edit input,.quick-edit select{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--line);color:var(--ink);font-size:12px;font-family:inherit;border-radius:3px;outline:none}
.quick-edit input:focus,.quick-edit select:focus{border-color:var(--gold)}
.qe-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qe-actions{display:flex;gap:6px;margin-top:12px;justify-content:flex-end}
.qe-delete{color:var(--red);background:none;border:none;font-size:11px;cursor:pointer;margin-right:auto;font-family:inherit}
.qe-delete:hover{text-decoration:underline}

/* Stats bar */
.stats-bar{display:flex;gap:16px;padding:6px 20px;background:var(--bg2);border-top:1px solid var(--line);font-size:11px;color:var(--ink-m);flex-shrink:0;align-items:center}
.stats-bar strong{color:var(--ink)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink-d);font-size:14px}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh">

<div class="topbar">
  <h1>📅 Шахматка <a href="/admin.html">← Админ-панель</a></h1>
  <div class="controls">
    <div class="month-nav">
      <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)">← Пред</button>
      <span class="month-label" id="monthLabel">Апрель 2026</span>
      <button class="btn btn-outline btn-sm" onclick="changeMonth(1)">След →</button>
    </div>
    <button class="btn btn-outline btn-sm" onclick="goToday()">Сегодня</button>
    <button class="btn btn-sm" onclick="loadData()">🔄</button>
    <button class="btn btn-sm" onclick="newBooking()">+ Бронь</button>
  </div>
</div>

<div class="legend">
  <span style="color:var(--ink);font-weight:500;margin-right:4px">Источники:</span>
  <span class="legend-item"><span class="legend-dot" style="background:#FF5A5F"></span>Airbnb</span>
  <span class="legend-item"><span class="legend-dot" style="background:#003580"></span>Booking</span>
  <span class="legend-item"><span class="legend-dot" style="background:#2ecc71"></span>Ostrovok</span>
  <span class="legend-item"><span class="legend-dot" style="background:#f39c12"></span>Яндекс</span>
  <span class="legend-item"><span class="legend-dot" style="background:var(--gold)"></span>Сайт</span>
  <span class="legend-item"><span class="legend-dot" style="background:#555"></span>Другое</span>
  <span style="flex:1"></span>
  <span style="color:var(--ink-d)">Drag для перемещения · Правый край для продления · Клик для редактирования</span>
</div>

<div class="grid-wrap" id="gridWrap">
  <div class="loading" id="loadingMsg">Загрузка данных...</div>
</div>

<div class="stats-bar" id="statsBar">
  <span>Загрузка: <strong id="stOcc">—</strong></span>
  <span>Занято: <strong id="stBusy">—</strong></span>
</div>

</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Quick Edit -->
<div class="quick-edit" id="quickEdit">
  <h3 id="qeTitle">Редактировать бронь</h3>
  <input type="hidden" id="qeBookingId">
  <input type="hidden" id="qeAptId">
  <div class="qe-row">
    <div><label>Заезд</label><input type="date" id="qeCI"></div>
    <div><label>Выезд</label><input type="date" id="qeCO"></div>
  </div>
  <label>Гость</label><input type="text" id="qeGuest" placeholder="Имя гостя">
  <div class="qe-row">
    <div><label>Цена ($)</label><input type="number" id="qePrice" placeholder="0"></div>
    <div><label>Источник</label><select id="qeSrc"><option value="website">🌐 Сайт</option><option value="airbnb">🏠 Airbnb</option><option value="booking">📘 Booking</option><option value="ostrovok">🟢 Ostrovok</option><option value="yandex">🟡 Яндекс</option><option value="phone">📞 Телефон</option><option value="blocked">🔒 Блок</option></select></div>
  </div>
  <label>Телефон</label><input type="text" id="qePhone" placeholder="+998...">
  <div class="qe-actions">
    <button class="qe-delete" id="qeDeleteBtn" onclick="deleteBooking()">🗑 Удалить</button>
    <button class="btn btn-outline btn-sm" onclick="closeQuickEdit()">Отмена</button>
    <button class="btn btn-sm" onclick="saveQuickEdit()">Сохранить</button>
  </div>
</div>

<script>
const SB_URL='https://sebvfvtofiysbywxjqut.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlYnZmdnRvZml5c2J5d3hqcXV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMjgzNjIsImV4cCI6MjA5MTkwNDM2Mn0.Pk5C4mwyJNpWRSz30V-F6I-0qGs0If6FRhg8tM5mBcI';
const sb=supabase.createClient(SB_URL,SB_KEY);

// State
let curMonth=new Date().getMonth(), curYear=new Date().getFullYear();
let apartments=[], bookings=[], icalBookings=[];
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_SHORT=['вс','пн','вт','ср','чт','пт','сб'];
const SRC_COLORS={airbnb:'src-airbnb',booking:'src-booking',ostrovok:'src-ostrovok',yandex:'src-yandex',sutochno:'src-sutochno',website:'src-website',phone:'src-phone',telegram:'src-telegram',blocked:'src-blocked',other:'src-other'};
const SRC_NAMES={airbnb:'Airbnb',booking:'Booking.com',ostrovok:'Ostrovok',yandex:'Яндекс',sutochno:'Sutochno',website:'Сайт',phone:'Телефон',telegram:'Telegram',blocked:'Блокировка',other:'RC/Другое'};
const CX_COLORS={'Nest One':'#2ecc71','U-Tower':'#3498db','U-Tower 2':'#3498db','Mirabad':'#e67e22','Kislorod':'#e74c3c'};

// ========== AUTH ==========
async function checkAuth(){
  const{data:{user}}=await sb.auth.getUser();
  if(!user){window.location.href='/admin.html';return false}
  return true;
}

// ========== DATA ==========
async function loadData(){
  document.getElementById('loadingMsg').style.display='flex';
  const ok=await checkAuth();if(!ok)return;
  
  const[aptR, bkR, icalR]=await Promise.all([
    sb.from('apartments').select('id,name,complex,floor').eq('is_active',true).order('complex'),
    sb.from('bookings').select('id,apartment_id,guest_name,guest_phone,guest_email,check_in,check_out,total_price,source,status,booking_ref,nights').neq('status','cancelled'),
    fetch('/.netlify/functions/sync-ical').then(r=>r.json()).catch(()=>({all_bookings:[]}))
  ]);
  
  apartments=aptR.data||[];
  bookings=bkR.data||[];
  icalBookings=icalR.all_bookings||[];
  
  render();
}

function changeMonth(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++}if(curMonth<0){curMonth=11;curYear--}render()}
function goToday(){curMonth=new Date().getMonth();curYear=new Date().getFullYear();render()}

// ========== MERGE BOOKINGS ==========
function getMergedBookings(aptId){
  const db=bookings.filter(b=>b.apartment_id===aptId);
  const ical=icalBookings.filter(b=>b.apartment_id===aptId);
  // Merge: DB takes priority, add iCal-only bookings
  const merged=[...db];
  ical.forEach(ic=>{
    if(!db.some(d=>d.check_in===ic.check_in))
      merged.push({id:'ical_'+ic.check_in,apartment_id:aptId,guest_name:ic.summary||'',check_in:ic.check_in,check_out:ic.check_out,total_price:null,source:ic.source||'other',status:'confirmed',nights:ic.nights||1,isIcal:true});
  });
  return merged;
}

// ========== RENDER ==========
function render(){
  const dm=new Date(curYear,curMonth+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('monthLabel').textContent=MONTHS[curMonth]+' '+curYear;
  
  // Group apartments by complex
  const groups={};
  const cxOrder=['Kislorod','Mirabad','Nest One','U-Tower'];
  apartments.forEach(a=>{
    const cx=a.complex==='U-Tower 2'?'U-Tower':a.complex;
    if(!groups[cx])groups[cx]=[];
    groups[cx].push(a);
  });
  
  // Calculate total rows
  let totalRows=0;
  cxOrder.forEach(cx=>{if(groups[cx]){totalRows+=1+groups[cx].length}});
  
  // Build grid
  const cols=dm+1; // 1 name col + dm day cols
  const wrap=document.getElementById('gridWrap');
  
  let html=`<div class="chess" style="grid-template-columns:var(--name-w) repeat(${dm},var(--col-w))">`;
  
  // Header
  html+='<div class="chess-corner">Апартамент</div>';
  for(let d=1;d<=dm;d++){
    const dt=new Date(curYear,curMonth,d);
    const ds=fmtDate(curYear,curMonth,d);
    const isToday=ds===today;
    const isWe=dt.getDay()===0||dt.getDay()===6;
    html+=`<div class="chess-day${isToday?' today':''}${isWe?' weekend':''}"><span class="dow">${DAYS_SHORT[dt.getDay()]}</span>${d}</div>`;
  }
  
  // Rows
  let rowIdx=0;
  cxOrder.forEach(cx=>{
    if(!groups[cx])return;
    // Complex header spans full width
    html+=`<div class="chess-complex" style="grid-column:1/-1;color:${CX_COLORS[cx]||'#888'}"><span class="chess-complex-dot" style="background:${CX_COLORS[cx]||'#888'}"></span>${cx} (${groups[cx].length})</div>`;
    rowIdx++;
    
    groups[cx].forEach(apt=>{
      html+=`<div class="chess-apt" data-apt="${apt.id}">${apt.name}</div>`;
      for(let d=1;d<=dm;d++){
        const ds=fmtDate(curYear,curMonth,d);
        const dt=new Date(curYear,curMonth,d);
        const isToday=ds===today;
        const isWe=dt.getDay()===0||dt.getDay()===6;
        html+=`<div class="chess-cell${isToday?' today':''}${isWe?' weekend':''}" data-apt="${apt.id}" data-date="${ds}" data-day="${d}"></div>`;
      }
      rowIdx++;
    });
  });
  
  html+='</div>';
  wrap.innerHTML=html;
  document.getElementById('loadingMsg').style.display='none';
  
  // Now overlay booking bars
  renderBookingBars(dm);
  updateStats(dm);
}

function renderBookingBars(dm){
  const monthStart=fmtDate(curYear,curMonth,1);
  const monthEnd=fmtDate(curYear,curMonth,dm);
  
  apartments.forEach(apt=>{
    const merged=getMergedBookings(apt.id);
    merged.forEach(bk=>{
      if(bk.check_out<=monthStart||bk.check_in>monthEnd)return;
      
      // Calculate position
      const startDay=Math.max(1,dayOfMonth(bk.check_in));
      const endDay=Math.min(dm,dayOfMonth(bk.check_out)-1); // check_out day is free
      if(endDay<startDay)return;
      
      // Find the first cell for this apt+startDay
      const startCell=document.querySelector(`.chess-cell[data-apt="${apt.id}"][data-day="${startDay}"]`);
      if(!startCell)return;
      
      const span=endDay-startDay+1;
      const bar=document.createElement('div');
      bar.className=`booking-bar ${SRC_COLORS[bk.source]||'src-other'}`;
      bar.style.width=`calc(${span} * var(--col-w) - 4px)`;
      bar.style.left='2px';
      bar.dataset.bookingId=bk.id;
      bar.dataset.aptId=apt.id;
      bar.dataset.checkIn=bk.check_in;
      bar.dataset.checkOut=bk.check_out;
      bar.dataset.isIcal=bk.isIcal?'1':'0';
      
      const guest=bk.guest_name||'';
      const price=bk.total_price?'$'+Math.round(bk.total_price/Math.max(1,bk.nights||span)):'';
      const ref=bk.booking_ref||'';
      bar.innerHTML=`<span class="bar-label">${ref?ref+' ':''}${guest}</span>${price?'<span class="bar-price">'+price+'/н</span>':''}<div class="resize-r"></div>`;
      
      // Events
      if(!bk.isIcal){
        bar.draggable=false; // we handle drag manually
        bar.addEventListener('mousedown',e=>onBarMouseDown(e,bk,bar));
      }
      bar.addEventListener('mouseenter',e=>showTooltip(e,bk,apt));
      bar.addEventListener('mouseleave',hideTooltip);
      bar.addEventListener('click',e=>{e.stopPropagation();if(!bar.classList.contains('dragging'))openQuickEdit(bk,apt,e)});
      
      startCell.appendChild(bar);
    });
  });
  
  // Click on empty cells
  document.querySelectorAll('.chess-cell').forEach(cell=>{
    cell.addEventListener('click',e=>{
      if(e.target===cell)newBookingAt(cell.dataset.apt,cell.dataset.date);
    });
  });
}

// ========== DRAG & DROP ==========
let dragState=null;

function onBarMouseDown(e,bk,bar){
  if(e.button!==0)return;
  const isResize=e.target.classList.contains('resize-r');
  const rect=bar.getBoundingClientRect();
  
  dragState={
    bk,bar,
    mode:isResize?'resize':'move',
    startX:e.clientX,startY:e.clientY,
    origCI:bk.check_in,origCO:bk.check_out,origApt:bk.apartment_id,
    moved:false,
    barRect:rect
  };
  
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragEnd);
  e.preventDefault();
}

function onDragMove(e){
  if(!dragState)return;
  const dx=e.clientX-dragState.startX;
  const dy=e.clientY-dragState.startY;
  
  if(!dragState.moved&&Math.abs(dx)<5&&Math.abs(dy)<5)return;
  dragState.moved=true;
  dragState.bar.classList.add('dragging');
  
  // Find cell under cursor
  const el=document.elementFromPoint(e.clientX,e.clientY);
  const cell=el?.closest?.('.chess-cell');
  
  // Clear previous drop targets
  document.querySelectorAll('.drop-target').forEach(c=>c.classList.remove('drop-target'));
  
  if(cell){
    cell.classList.add('drop-target');
    dragState.targetDate=cell.dataset.date;
    dragState.targetApt=cell.dataset.apt;
  }
  
  if(dragState.mode==='move'){
    // Move the bar visually
    dragState.bar.style.transform=`translate(${dx}px,${dy}px)`;
  }else{
    // Resize: extend/shrink width
    const colW=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--col-w'));
    const daysDelta=Math.round(dx/colW);
    const origNights=dateDiff(dragState.origCI,dragState.origCO);
    const newNights=Math.max(1,origNights+daysDelta);
    dragState.bar.style.width=`calc(${newNights} * var(--col-w) - 4px)`;
    dragState.newCheckOut=addDays(dragState.origCI,newNights);
  }
}

async function onDragEnd(e){
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  if(!dragState)return;
  
  document.querySelectorAll('.drop-target').forEach(c=>c.classList.remove('drop-target'));
  dragState.bar.classList.remove('dragging');
  dragState.bar.style.transform='';
  
  if(!dragState.moved){dragState=null;return}
  
  const bk=dragState.bk;
  
  if(dragState.mode==='move'&&dragState.targetDate&&dragState.targetApt){
    // Calculate new dates
    const nights=dateDiff(bk.check_in,bk.check_out);
    const newCI=dragState.targetDate;
    const newCO=addDays(newCI,nights);
    const newApt=dragState.targetApt;
    
    if(newCI!==bk.check_in||newApt!==bk.apartment_id){
      const{error}=await sb.from('bookings').update({
        check_in:newCI,check_out:newCO,apartment_id:newApt,updated_at:new Date().toISOString()
      }).eq('id',bk.id);
      if(error)alert('Ошибка: '+error.message);
      else await loadData();
    }
  }else if(dragState.mode==='resize'&&dragState.newCheckOut){
    const newCO=dragState.newCheckOut;
    if(newCO!==bk.check_out){
      const nights=dateDiff(bk.check_in,newCO);
      const{error}=await sb.from('bookings').update({
        check_out:newCO,nights,updated_at:new Date().toISOString()
      }).eq('id',bk.id);
      if(error)alert('Ошибка: '+error.message);
      else await loadData();
    }
  }
  
  dragState=null;
}

// ========== TOOLTIP ==========
function showTooltip(e,bk,apt){
  const tt=document.getElementById('tooltip');
  const srcName=SRC_NAMES[bk.source]||bk.source;
  const nights=bk.nights||dateDiff(bk.check_in,bk.check_out);
  const ppn=bk.total_price?Math.round(bk.total_price/Math.max(1,nights)):null;
  
  tt.innerHTML=`
    <div class="tt-title">${apt.name} · ${apt.complex}</div>
    <div class="tt-row"><span>Гость</span><strong>${bk.guest_name||'—'}</strong></div>
    <div class="tt-row"><span>Даты</span><strong>${bk.check_in} → ${bk.check_out}</strong></div>
    <div class="tt-row"><span>Ночей</span><strong>${nights}</strong></div>
    ${bk.total_price?`<div class="tt-row"><span>Цена</span><strong>$${bk.total_price} ($${ppn}/ночь)</strong></div>`:''}
    <div class="tt-row"><span>Источник</span><strong>${srcName}</strong></div>
    ${bk.booking_ref?`<div class="tt-row"><span>Реф</span><strong>${bk.booking_ref}</strong></div>`:''}
    ${bk.isIcal?'<div style="color:var(--ink-d);font-size:10px;margin-top:4px">📋 Из RealtyCalendar (только чтение)</div>':''}
  `;
  
  tt.style.left=Math.min(e.clientX+12,window.innerWidth-280)+'px';
  tt.style.top=Math.min(e.clientY+12,window.innerHeight-200)+'px';
  tt.classList.add('show');
}

function hideTooltip(){document.getElementById('tooltip').classList.remove('show')}

// ========== QUICK EDIT ==========
function openQuickEdit(bk,apt,e){
  hideTooltip();
  const qe=document.getElementById('quickEdit');
  document.getElementById('qeTitle').textContent=bk.isIcal?`${apt.name} (только чтение)`:`✎ ${apt.name}`;
  document.getElementById('qeBookingId').value=bk.id;
  document.getElementById('qeAptId').value=bk.apartment_id;
  document.getElementById('qeCI').value=bk.check_in;
  document.getElementById('qeCO').value=bk.check_out;
  document.getElementById('qeGuest').value=bk.guest_name||'';
  document.getElementById('qePrice').value=bk.total_price||'';
  document.getElementById('qeSrc').value=bk.source||'website';
  document.getElementById('qePhone').value=bk.guest_phone||'';
  document.getElementById('qeDeleteBtn').style.display=bk.isIcal?'none':'block';
  
  // Disable fields for iCal bookings
  const inputs=qe.querySelectorAll('input,select');
  inputs.forEach(inp=>inp.disabled=!!bk.isIcal);
  
  // Position near click
  const x=Math.min(e.clientX,window.innerWidth-340);
  const y=Math.min(e.clientY-50,window.innerHeight-400);
  qe.style.left=x+'px';
  qe.style.top=Math.max(10,y)+'px';
  qe.classList.add('show');
  
  // Close on outside click
  setTimeout(()=>document.addEventListener('click',closeQuickEditOutside),10);
}

function closeQuickEdit(){
  document.getElementById('quickEdit').classList.remove('show');
  document.removeEventListener('click',closeQuickEditOutside);
}

function closeQuickEditOutside(e){
  const qe=document.getElementById('quickEdit');
  if(!qe.contains(e.target))closeQuickEdit();
}

async function saveQuickEdit(){
  const id=document.getElementById('qeBookingId').value;
  if(id.startsWith('ical_'))return;
  
  const ci=document.getElementById('qeCI').value;
  const co=document.getElementById('qeCO').value;
  const nights=dateDiff(ci,co);
  
  const update={
    check_in:ci,check_out:co,nights,
    guest_name:document.getElementById('qeGuest').value,
    total_price:parseFloat(document.getElementById('qePrice').value)||0,
    source:document.getElementById('qeSrc').value,
    guest_phone:document.getElementById('qePhone').value,
    updated_at:new Date().toISOString()
  };
  
  const{error}=await sb.from('bookings').update(update).eq('id',id);
  if(error){alert('Ошибка: '+error.message);return}
  closeQuickEdit();
  await loadData();
}

async function deleteBooking(){
  const id=document.getElementById('qeBookingId').value;
  if(!confirm('Удалить эту бронь?'))return;
  const{error}=await sb.from('bookings').update({status:'cancelled',updated_at:new Date().toISOString()}).eq('id',id);
  if(error)alert('Ошибка: '+error.message);
  closeQuickEdit();
  await loadData();
}

// ========== NEW BOOKING ==========
function newBookingAt(aptId,date){
  if(!aptId||!date)return;
  const apt=apartments.find(a=>a.id===aptId);
  const qe=document.getElementById('quickEdit');
  document.getElementById('qeTitle').textContent=`➕ Новая бронь · ${apt?.name||aptId}`;
  document.getElementById('qeBookingId').value='new';
  document.getElementById('qeAptId').value=aptId;
  document.getElementById('qeCI').value=date;
  document.getElementById('qeCO').value=addDays(date,1);
  document.getElementById('qeGuest').value='';
  document.getElementById('qePrice').value='';
  document.getElementById('qeSrc').value='website';
  document.getElementById('qePhone').value='';
  document.getElementById('qeDeleteBtn').style.display='none';
  
  const inputs=qe.querySelectorAll('input,select');
  inputs.forEach(inp=>inp.disabled=false);
  
  // Override save
  const origSave=window.saveQuickEdit;
  window.saveQuickEdit=async function(){
    const ci=document.getElementById('qeCI').value;
    const co=document.getElementById('qeCO').value;
    const nights=dateDiff(ci,co);
    const src=document.getElementById('qeSrc').value;
    const isBlock=src==='blocked';
    
    const{error}=await sb.from('bookings').insert({
      apartment_id:aptId,
      guest_name:isBlock?'🔒 БЛОКИРОВКА':(document.getElementById('qeGuest').value||'Гость'),
      guest_phone:document.getElementById('qePhone').value,
      check_in:ci,check_out:co,nights,
      total_price:parseFloat(document.getElementById('qePrice').value)||0,
      source:src,status:isBlock?'blocked':'confirmed'
    });
    if(error){alert('Ошибка: '+error.message);return}
    window.saveQuickEdit=origSave;
    closeQuickEdit();
    await loadData();
  };
  
  qe.style.left='50%';qe.style.top='30%';qe.style.transform='translateX(-50%)';
  qe.classList.add('show');
  setTimeout(()=>{qe.style.transform='';document.addEventListener('click',closeQuickEditOutside)},10);
}

function newBooking(){
  const aptId=apartments[0]?.id;
  const today=new Date().toISOString().split('T')[0];
  newBookingAt(aptId,today);
}

// ========== STATS ==========
function updateStats(dm){
  const monthStart=fmtDate(curYear,curMonth,1);
  let totalCells=0,busyCells=0;
  const cxStats={};
  
  apartments.forEach(apt=>{
    const cx=apt.complex==='U-Tower 2'?'U-Tower':apt.complex;
    if(!cxStats[cx])cxStats[cx]={total:0,busy:0};
    const merged=getMergedBookings(apt.id);
    for(let d=1;d<=dm;d++){
      const ds=fmtDate(curYear,curMonth,d);
      totalCells++;cxStats[cx].total++;
      if(merged.some(b=>ds>=b.check_in&&ds<b.check_out)){busyCells++;cxStats[cx].busy++}
    }
  });
  
  const pct=totalCells?Math.round(busyCells/totalCells*100):0;
  document.getElementById('stOcc').innerHTML=`<span style="color:${pct>80?'var(--green)':pct>50?'var(--gold)':'var(--red)'}">${pct}%</span>`;
  
  let cxHTML=Object.entries(cxStats).map(([cx,s])=>{
    const p=s.total?Math.round(s.busy/s.total*100):0;
    return`<span style="color:${CX_COLORS[cx]||'#888'}">${cx}: <strong>${p}%</strong></span>`;
  }).join('');
  document.getElementById('stBusy').innerHTML=`${busyCells}/${totalCells} ночей`;
  document.getElementById('statsBar').innerHTML+=cxHTML?'<span style="flex:1"></span>'+cxHTML:'';
}

// ========== HELPERS ==========
function fmtDate(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function dayOfMonth(ds){return parseInt(ds.split('-')[2])}
function dateDiff(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}

// ========== INIT ==========
loadData();
</script>
