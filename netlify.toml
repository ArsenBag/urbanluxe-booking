[build]
  publish = "public"
    functions = "netlify/functions"

    [functions]
      node_bundler = "esbuild"

      [[headers]]
        for = "/*"
          [headers.values]
              Access-Control-Allow-Origin = "*"
                  Access-Control-Allow-Methods = "GET, POST, OPTIONS"
                      Access-Control-Allow-Headers = "Content-Type"

# Cache images served through Netlify CDN
      [[headers]]
        for = "/img/*"
          [headers.values]
            Cache-Control = "public, max-age=31536000, immutable"

# Proxy Supabase images through Netlify CDN for speed
[[redirects]]
  from = "/img/*"
  to = "https://sebvfvtofiysbywxjqut.supabase.co/storage/v1/object/public/:splat"
  status = 200
  force = true
  [redirects.headers]
    Cache-Control = "public, max-age=31536000, immutable"
